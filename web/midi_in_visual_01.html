<!DOCTYPE html>
<html>
<head>
    <style>
         body {
        height: 100vh;
        margin: 0;
      }

        canvas {
            background-color: black;
        }

        #midiButton {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 1;
            padding: 8px 12px;
            font: 14px monospace;
        }

        #status {
            position: fixed;
            top: 54px;
            left: 12px;
            max-width: min(720px, calc(100vw - 24px));
            z-index: 1;
            padding: 8px 12px;
            color: white;
            background: rgba(0, 0, 0, 0.55);
            font: 13px monospace;
            white-space: pre-wrap;
        }
    </style>

<body>
    <button id="midiButton">Start MIDI</button>
    <div id="status">MIDI not started</div>
    <canvas id="canvas" width="600" height="200"></canvas>
    <script>

        // Get canvas and context
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const midiButton = document.getElementById('midiButton');
        const status = document.getElementById('status');

        let cw;
        let ch; 

function resizeCanvas() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();


        let count = 0
        const noteStates = Array(88).fill(0);
        const keys = Array(88).map(() => false);
        let midiAccess = null;

        // Set up a function to handle MIDI messages
        function handleMIDIMessage(e) {
            //console.log(e);
            const message = e.data;
            // console.log(`${message[0]} ${message[1]} ${message[2]}`);

            // Extract the type of the message (the first 4 bits)
            const messageType = message[0] & 0xF0;

            // Extract the channel (the last 4 bits)
            const channel = message[0] & 0x0F;

            switch (messageType) {
                case 0x90: // Note on
                case 0x80: // Note off
                    const pitch = message[1];
                    keys[pitch - 21] = (messageType === 0x90);
                    if (keys[pitch - 21])
                      noteStates[pitch - 21] = 1.0;
                    break;
            }
        }

        function setStatus(text) {
            status.textContent = text;
            console.log(text);
        }

        function environmentInfo() {
            return `Browser: ${navigator.userAgent}\nURL: ${location.protocol}\nSecure context: ${window.isSecureContext}`;
        }

        function unsupportedMessage() {
            return [
                'Web MIDI status: unsupported',
                '',
                'This browser does not expose navigator.requestMIDIAccess.',
                'Expected examples: Firefox, Safari, iPad Safari.',
                '',
                environmentInfo()
            ].join('\n');
        }

        function permissionMessage(error) {
            return [
                `Web MIDI status: permission denied (${error.name})`,
                '',
                'The browser exposes Web MIDI, but this page/context is not allowed to use it.',
                'This can happen in embedded browsers, VS Code previews, blocked site permissions, or stricter file:// handling.',
                'Try Chrome or Opera as a normal top-level tab and reset MIDI permissions for this page if needed.',
                '',
                environmentInfo()
            ].join('\n');
        }

        function connectInputs() {
            if (!midiAccess) return;

            midiAccess.inputs.forEach(function (input) {
                input.onmidimessage = handleMIDIMessage;
            });

            const names = Array.from(midiAccess.inputs.values())
                .map(input => input.name || '<unknown>');
            const sourceText = names.length > 0
                ? names.join(', ')
                : '-';

            setStatus([
                `Web MIDI status: ready`,
                `Inputs: ${midiAccess.inputs.size}`,
                `Sources: ${sourceText}`
            ].join('\n'));
        }

        async function startMIDI() {
            if (!navigator.requestMIDIAccess) {
                setStatus(unsupportedMessage());
                midiButton.disabled = true;
                return;
            }

            setStatus('Web MIDI status: requesting access...');

            try {
                midiAccess = await navigator.requestMIDIAccess({ sysex: false });
                midiAccess.addEventListener('statechange', connectInputs);
                connectInputs();
            } catch (error) {
                setStatus(permissionMessage(error));
            }
        }

        midiButton.addEventListener('click', startMIDI);
        if (!navigator.requestMIDIAccess)
            setStatus(unsupportedMessage());



        function draw() {
            ctx.clearRect(0, 0, cw, ch);
            ctx.fillStyle = 'white';
            ctx.strokeStyle = "white";
            ctx.globalCompositeOperation = 'xor';
            const bw = cw / 88;
            for (let i = 0; i < 88; i++) {
                noteStates[i] *= keys[i] ? 0.995 : 0.97; 
                const height = ch * noteStates[i];
                const width = cw/3*(1-noteStates[i]);
    if (height > 0.5) {
        const x = bw * i + (bw - width) / 2;
        const y = (ch - height) / 2;
        const w = bw + width;
        const h = height;
        ctx.fillRect(x, y, w, h);
        ctx.strokeRect(x, y, w, h);
    }
            }

            requestAnimationFrame(draw);
        }

        draw(); // start the animation loop

    // Fullscreen toggle on 'f' key
    document.addEventListener('keydown', function(event) {
        if (event.key === 'f') {
            toggleFullScreen();
        }
    });

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error attempting to enable full-screen mode: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }
    </script>

</body>

</html>
